openapi: 3.0.3
info:
  title: Padduck API
  description: Route-complete REST API specification for the current backend.
  version: 1.32.17
  x-api-contract: stable-v1
  contact:
    name: Padduck

servers:
  - url: /
    description: Same-origin API

security:
  - sessionCookie: []
  - bearerToken: []

tags:
  - name: System
  - name: Auth
  - name: Security
  - name: Users
  - name: Networks
  - name: Subnets
  - name: IP Addresses
  - name: VRFs
  - name: VLANs
  - name: VLAN Domains
  - name: VLAN Groups
  - name: Tags
  - name: Devices
  - name: Racks
  - name: Locations
  - name: Nameservers
  - name: DNS
  - name: Requests
  - name: Dashboard
  - name: Reports
  - name: Import Export
  - name: Discovery
  - name: Scan Agents
  - name: Admin
  - name: RBAC
  - name: External Auth
  - name: GDPR
  - name: Automation
  - name: Grafana
  - name: Customers
  - name: NAT
  - name: Firewall
  - name: DHCP
  - name: Circuits
  - name: BGP

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
    bearerToken:
      type: http
      scheme: bearer
      description: >
        API token issued from User Settings → API Tokens.
        Tokens carry an optional scope. Endpoints tagged Admin require the
        token scope to be "admin"; a token with any other scope (e.g. "read")
        will receive 403 even if the issuing account has the admin role.
        Browser sessions (session cookie) are not subject to scope restrictions.
    agentToken:
      type: http
      scheme: bearer
      description: >
        Agent token issued when creating or rotating a scan agent via
        POST /api/v1/admin/scan-agents or POST /api/v1/admin/scan-agents/{id}/rotate-token.
        Not interchangeable with user API tokens.
    csrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token

  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: integer
    networkID:
      name: networkID
      in: path
      required: true
      schema:
        type: integer
    subnetID:
      name: subnetID
      in: path
      required: true
      schema:
        type: integer
    vrfID:
      name: vrfID
      in: path
      required: true
      schema:
        type: integer
    sessionID:
      name: sessionID
      in: path
      required: true
      schema:
        type: integer
    roleID:
      name: role_id
      in: path
      required: true
      schema:
        type: integer
    permID:
      name: perm_id
      in: path
      required: true
      schema:
        type: integer
    runID:
      name: run_id
      in: path
      required: true
      schema:
        type: integer
    ipID:
      name: ip_id
      in: path
      required: true
      schema:
        type: integer
    interfaceID:
      name: if_id
      in: path
      required: true
      schema:
        type: integer
    requestType:
      name: type
      in: path
      required: true
      schema:
        type: string
        enum: [subnet, ip, subnets, ips]
    zone:
      name: zone
      in: path
      required: true
      schema:
        type: string
    limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 100
    offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
    idempotencyKey:
      name: Idempotency-Key
      in: header
      description: Optional client-generated key for retry-safe automation writes. Reusing a key with a different request returns 409.
      schema:
        type: string
        minLength: 1
        maxLength: 255

  schemas:
    Error:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
        code:
          type: string
        details:
          type: string
        fields:
          type: array
          items:
            type: object
            required: [field, message]
            properties:
              field:
                type: string
              message:
                type: string
    WebhookEvent:
      type: object
      required: [schema_version, event_type, action, resource_type, status, occurred_at]
      properties:
        schema_version:
          type: string
          example: "2026-05-19"
        event_type:
          type: string
          example: ip_address.assigned
        action:
          type: string
          example: assigned
        resource_type:
          type: string
          example: ip_address
        resource_id:
          type: integer
          nullable: true
        resource_name:
          type: string
        user_id:
          type: integer
          nullable: true
        username:
          type: string
        status:
          type: string
          example: success
        old_values:
          $ref: "#/components/schemas/GenericObject"
        new_values:
          $ref: "#/components/schemas/GenericObject"
        occurred_at:
          type: string
          format: date-time
    AutomationWriteResponse:
      type: object
      properties:
        policy:
          $ref: "#/components/schemas/GenericObject"
        data:
          $ref: "#/components/schemas/GenericObject"
    GenericObject:
      type: object
      additionalProperties: true
    GenericArray:
      type: array
      items:
        $ref: "#/components/schemas/GenericObject"
    User:
      allOf:
        - $ref: "#/components/schemas/GenericObject"
        - type: object
          properties:
            id:
              type: integer
            username:
              type: string
            email:
              type: string
            role:
              type: string
            state:
              type: string
    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
        mfa_required:
          type: boolean
        mfa_token:
          type: string
    CSRFToken:
      type: object
      properties:
        csrf_token:
          type: string

  requestBodies:
    JSON:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GenericObject"
    CSVUpload:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              file:
                type: string
                format: binary

  responses:
    OK:
      description: Successful response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GenericObject"
    OKArray:
      description: Successful list response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GenericArray"
    Created:
      description: Resource created
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GenericObject"
    NoContent:
      description: No content
    CSV:
      description: CSV download
      content:
        text/csv:
          schema:
            type: string
    JSONDownload:
      description: JSON download
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GenericObject"
    BinaryDownload:
      description: Binary download
      content:
        application/zip:
          schema:
            type: string
            format: binary
    Redirect:
      description: Browser redirect
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Authentication required or failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Permission denied
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadGateway:
      description: Bad gateway — upstream service error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

paths:
  /api/openapi.yaml:
    get:
      tags: [System]
      summary: Get OpenAPI specification
      security: []
      responses:
        "200":
          description: OpenAPI YAML document
          content:
            application/yaml:
              schema:
                type: string

  /health:
    get:
      tags: [System]
      summary: Health check
      security: []
      responses:
        "200":
          $ref: "#/components/responses/OK"
        "503":
          $ref: "#/components/responses/OK"

  /api/v1/csrf-token:
    get:
      tags: [Security]
      summary: Get CSRF token
      security: []
      responses:
        "200":
          description: CSRF token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CSRFToken"

  /api/v1/privacy-policy/version:
    get:
      tags: [Auth]
      summary: Get current privacy policy version
      security: []
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in with username and password
      security: []
      requestBody:
        $ref: "#/components/requestBodies/JSON"
      responses:
        "200":
          description: Login response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a local user account
      security: []
      requestBody:
        $ref: "#/components/requestBodies/JSON"
      responses:
        "201":
          $ref: "#/components/responses/Created"
        "400":
          $ref: "#/components/responses/ValidationError"

  /api/v1/auth/verify-email:
    get:
      tags: [Auth]
      summary: Verify an email address
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/OK"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend verification email
      security: []
      requestBody:
        $ref: "#/components/requestBodies/JSON"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/v1/auth/request-password-reset:
    post:
      tags: [Auth]
      summary: Request password reset
      security: []
      requestBody:
        $ref: "#/components/requestBodies/JSON"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/v1/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password
      security: []
      requestBody:
        $ref: "#/components/requestBodies/JSON"
      responses:
        "200":
          $ref: "#/components/responses/OK"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/auth/unlock:
    get:
      tags: [Security]
      summary: Verify account unlock token
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/OK"
    post:
      tags: [Security]
      summary: Request account unlock
      security: []
      requestBody:
        $ref: "#/components/requestBodies/JSON"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/v1/auth/verify-mfa:
    post:
      tags: [Auth]
      summary: Complete MFA verification
      security: []
      requestBody:
        $ref: "#/components/requestBodies/JSON"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/v1/auth/ldap/login:
    get:
      tags: [External Auth]
      summary: Check whether LDAP login is enabled
      security: []
      responses:
        "200":
          $ref: "#/components/responses/OK"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [External Auth]
      summary: Log in with LDAP credentials
      security: []
      requestBody:
        $ref: "#/components/requestBodies/JSON"
      responses:
        "200":
          $ref: "#/components/responses/OK"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/oauth2/login:
    get:
      tags: [External Auth]
      summary: Start OAuth2 login
      security: []
      parameters:
        - name: redirect
          in: query
          schema:
            type: string
            default: /
      responses:
        "302":
          $ref: "#/components/responses/Redirect"

  /api/v1/auth/oauth2/callback:
    get:
      tags: [External Auth]
      summary: Complete OAuth2 login callback
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          $ref: "#/components/responses/Redirect"

  /api/v1/auth/saml/metadata:
    get:
      tags: [External Auth]
      summary: Get SAML service provider metadata
      security: []
      responses:
        "200":
          description: SAML metadata XML
          content:
            application/xml:
              schema:
                type: string

  /api/v1/auth/saml/login:
    get:
      tags: [External Auth]
      summary: Start SAML login
      security: []
      parameters:
        - name: relay_state
          in: query
          schema:
            type: string
            default: /
      responses:
        "302":
          $ref: "#/components/responses/Redirect"

  /api/v1/auth/saml/acs:
    post:
      tags: [External Auth]
      summary: Complete SAML assertion consumer callback
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [SAMLResponse]
              properties:
                SAMLResponse:
                  type: string
      responses:
        "302":
          $ref: "#/components/responses/Redirect"

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/v1/auth/me/logout:
    post:
      tags: [Auth]
      summary: Log out current session
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/v1/auth/me/tokens:
    get:
      tags: [Auth]
      summary: List personal API tokens
      responses:
        "200":
          $ref: "#/components/responses/OKArray"
    post:
      tags: [Auth]
      summary: Create personal API token
      requestBody:
        $ref: "#/components/requestBodies/JSON"
      responses:
        "201":
          $ref: "#/components/responses/Created"

  /api/v1/auth/me/tokens/{id}/rotate:
    post:
      tags: [Auth]
      summary: Rotate personal API token
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/v1/auth/me/tokens/{id}/extend:
    post:
      tags: [Auth]
      summary: Extend personal API token expiration
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        $ref: "#/components/requestBodies/JSON"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/v1/auth/me/sessions:
    get:
      tags: [Auth]
      summary: List active sessions
      responses:
        "200":
          $ref: "#/components/responses/OKArray"
    delete:
      tags: [Auth]
      summary: Revoke all other sessions
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/v1/auth/me/sessions/{sessionID}:
    delete:
      tags: [Auth]
      summary: Revoke one session
      parameters:
        - $ref: "#/components/parameters/sessionID"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/v1/auth/me/mfa:
    get:
      tags: [Auth]
      summary: Get MFA status
      responses:
        "200":
          $ref: "#/components/responses/OK"
    delete:
      tags: [Auth]
      summary: Disable TOTP MFA
      requestBody:
        $ref: "#/components/requestBodies/JSON"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/v1/auth/me/mfa/setup:
    post:
      tags: [Auth]
      summary: Begin TOTP MFA setup
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/v1/auth/me/mfa/confirm:
    post:
      tags: [Auth]
      summary: Confirm TOTP MFA setup
      requestBody:
        $ref: "#/components/requestBodies/JSON"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/v1/auth/me/mfa/backup-codes:
    post:
      tags: [Auth]
      summary: Regenerate MFA backup codes
      requestBody:
        $ref: "#/components/requestBodies/JSON"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/v1/auth/me/export:
    get:
      tags: [Auth, GDPR]
      summary: Export current user's personal data
      responses:
        "200":
          $ref: "#/components/responses/JSONDownload"

  /api/v1/auth/me/deletion-request:
    post:
      tags: [Auth, GDPR]
      summary: Request account deletion
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/v1/auth/me/accept-privacy:
    post:
      tags: [Auth]
      summary: Accept privacy policy
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/v1/user/login-history:
    get:
      tags: [Security]
      summary: Get current user's login history
      responses:
        "200":
          $ref: "#/components/responses/OKArray"

  /api/v1/user/notification-preferences:
    get:
      tags: [Users]
      summary: Get notification preferences
      responses:
        "200":
          $ref: "#/components/responses/OK"
    put:
      tags: [Users]
      summary: Update notification preferences
      requestBody:
        $ref: "#/components/requestBodies/JSON"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/v1/users:
    get:
      tags: [Users]
      summary: List users
      responses:
        "200":
          $ref: "#/components/responses/OKArray"
    post:
      tags: [Users]
      summary: Create user
      requestBody:
        $ref: "#/components/requestBodies/JSON"
      responses:
        "201":
          $ref: "#/components/responses/Created"

  /api/v1/users/{id}:
    get:
      tags: [Users]
      summary: Get user
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          $ref: "#/components/responses/OK"
    delete:
      tags: [Users]
      summary: Delete user
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"

  /api/v1/users/{id}/role:
    put:
      tags: [Users]
      summary: Update user role
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        $ref: "#/components/requestBodies/JSON"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/v1/networks:
    get:
      tags: [Networks]
      summary: List networks
      responses:
        "200":
          $ref: "#/components/responses/OKArray"
    post:
      tags: [Networks]
      summary: Create network
      requestBody:
        $ref: "#/components/requestBodies/JSON"
      responses:
        "201":
          $ref: "#/components/responses/Created"

  /api/v1/networks/search:
    post:
      tags: [Networks]
      summary: Search networks
      requestBody:
        $ref: "#/components/requestBodies/JSON"
      responses:
        "200":
          $ref: "#/components/responses/OKArray"

  /api/v1/networks/{id}:
    get:
      tags: [Networks]
      summary: Get network
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          $ref: "#/components/responses/OK"
    put:
      tags: [Networks]
      summary: Update network
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        $ref: "#/components/requestBodies/JSON"
      responses:
        "200":
          $ref: "#/components/responses/OK"
    delete:
      tags: [Networks]
      summary: Delete network
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"

  /api/v1/networks/{id}/subnets/tree:
    get:
      tags: [Networks, Subnets]
      summary: Get subnet tree for a network
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          $ref: "#/components/responses/OKArray"

  /api/v1/networks/{id}/topology:
    get:
      tags: [Networks]
      summary: Get network topology
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/v1/networks/{networkID}/subnets:
    get:
      tags: [Subnets]
      summary: List network subnets
      parameters:
        - $ref: "#/components/parameters/networkID"
      responses:
        "200":
          $ref: "#/components/responses/OKArray"
    post:
      tags: [Subnets]
      summary: Create subnet
      parameters:
        - $ref: "#/components/parameters/networkID"
      requestBody:
        $ref: "#/components/requestBodies/JSON"
      responses:
        "201":
          $ref: "#/components/responses/Created"

  /api/v1/networks/{networkID}/subnets/{subnetID}/ip-addresses:
    get:
      tags: [IP Addresses]
      summary: List IP addresses using legacy nested route
      parameters:
        - $ref: "#/components/parameters/networkID"
        - $ref: "#/components/parameters/subnetID"
      responses:
        "200":
          $ref: "#/components/responses/OKArray"
    post:
      tags: [IP Addresses]
      summary: Create IP address using legacy nested route
      parameters:
        - $ref: "#/components/parameters/networkID"
        - $ref: "#/components/parameters/subnetID"
      requestBody:
        $ref: "#/components/requestBodies/JSON"
      responses:
        "201":
          $ref: "#/components/responses/Created"

  /api/v1/networks/{networkID}/subnets/{subnetID}/ip-addresses/allocate:
    post:
      tags: [IP Addresses]
      summary: Allocate IP address using legacy nested route
      parameters:
        - $ref: "#/components/parameters/networkID"
        - $ref: "#/components/parameters/subnetID"
      requestBody:
        $ref: "#/components/requestBodies/JSON"
      responses:
        "201":
          $ref: "#/components/responses/Created"

  /api/v1/subnets/{id}:
    get:
      tags: [Subnets]
      summary: Get subnet
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          $ref: "#/components/responses/OK"
    put:
      tags: [Subnets]
      summary: Update subnet
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        $ref: "#/components/requestBodies/JSON"
      responses:
        "200":
          $ref: "#/components/responses/OK"
    delete:
      tags: [Subnets]
      summary: Delete subnet
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"

  /api/v1/subnets/{subnetID}/utilization:
    get:
      tags: [Subnets]
      summary: Get subnet utilization
      parameters:
        - $ref: "#/components/parameters/subnetID"
      responses:
        "200":
          $ref: "#/components/responses/OK"

  /api/v1/subnets/search/{networkID}:
