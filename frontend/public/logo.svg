<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Padduck IPAM">
  <defs>
    <!-- Subtle background glow around the duck -->
    <radialGradient id="bgGlow" cx="50%" cy="43%" r="42%">
      <stop offset="0%" stop-color="#0C2040"/>
      <stop offset="100%" stop-color="#020B1A"/>
    </radialGradient>
    <!-- Unified duck gradient (userSpaceOnUse so head+body share same lighting) -->
    <radialGradient id="duckFill" cx="190" cy="148" r="125" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFE040"/>
      <stop offset="42%"  stop-color="#FDB908"/>
      <stop offset="100%" stop-color="#C98000"/>
    </radialGradient>
    <!-- Darker gradient for tail -->
    <radialGradient id="tailFill" cx="50%" cy="40%" r="65%">
      <stop offset="0%"   stop-color="#FDB908"/>
      <stop offset="100%" stop-color="#9E6400"/>
    </radialGradient>
  </defs>

  <!-- ── Background ─────────────────────────────────────────────── -->
  <rect width="400" height="400" fill="#020B1A"/>
  <rect width="400" height="400" fill="url(#bgGlow)"/>

  <!-- ── Network topology ───────────────────────────────────────── -->
  <g stroke="#FDB908" stroke-width="1.4" fill="none" opacity="0.72" stroke-linecap="round">
    <line x1="200" y1="27"  x2="155" y2="52"/>
    <line x1="200" y1="27"  x2="245" y2="52"/>
    <line x1="155" y1="52"  x2="110" y2="88"/>
    <line x1="245" y1="52"  x2="290" y2="88"/>
    <line x1="110" y1="88"  x2="130" y2="130"/>
    <line x1="290" y1="88"  x2="270" y2="130"/>
    <line x1="155" y1="52"  x2="200" y2="100"/>
    <line x1="245" y1="52"  x2="200" y2="100"/>
    <line x1="130" y1="130" x2="200" y2="100"/>
    <line x1="270" y1="130" x2="200" y2="100"/>
  </g>
  <g fill="#FDB908">
    <circle cx="200" cy="27"  r="6.5"/>
    <circle cx="155" cy="52"  r="5.5"/>
    <circle cx="245" cy="52"  r="5.5"/>
    <circle cx="110" cy="88"  r="5"/>
    <circle cx="290" cy="88"  r="5"/>
    <circle cx="130" cy="130" r="4.5"/>
    <circle cx="270" cy="130" r="4.5"/>
    <circle cx="200" cy="100" r="8"/>
  </g>
  <!-- Hub node centre dot -->
  <circle cx="200" cy="100" r="3" fill="#020B1A"/>

  <!-- ── Duck ────────────────────────────────────────────────────── -->
  <!-- Tail (back-left upturned bump) -->
  <ellipse cx="142" cy="195" rx="17" ry="11" fill="url(#tailFill)" transform="rotate(-28 142 195)"/>
  <ellipse cx="142" cy="195" rx="12"  ry="7.5" fill="url(#duckFill)" transform="rotate(-28 142 195)"/>

  <!-- Body -->
  <ellipse cx="200" cy="200" rx="62" ry="52" fill="url(#duckFill)"/>
  <!-- Chest highlight -->
  <ellipse cx="184" cy="193" rx="30" ry="24" fill="#FFEA60" opacity="0.18"/>

  <!-- Head (overlaps body to form neck naturally) -->
  <circle cx="230" cy="156" r="44" fill="url(#duckFill)"/>
  <!-- Head highlight -->
  <ellipse cx="215" cy="143" rx="20" ry="15" fill="#FFEA60" opacity="0.2"/>

  <!-- Beak (teardrop pointing right) -->
  <path d="M272 151 Q289 157 272 164 Z" fill="#E07200"/>

  <!-- Eye -->
  <circle cx="248" cy="146" r="6.5" fill="#020B1A"/>
  <circle cx="246" cy="144" r="2.2" fill="white" opacity="0.9"/>

  <!-- Wing arc -->
  <path d="M158 198 Q200 180 238 200" fill="none" stroke="#B07800" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ── Fence & gate ────────────────────────────────────────────── -->
  <!-- Ground strip -->
  <rect x="58" y="258" width="284" height="14" rx="3" fill="#0D1A08"/>

  <!-- Left section: rails (draw before posts so posts sit on top) -->
  <rect x="68" y="213" width="116" height="9" rx="2" fill="#121808"/>
  <rect x="68" y="237" width="116" height="9" rx="2" fill="#121808"/>

  <!-- Left section: posts with angled caps -->
  <polygon points="68,196  75,187  82,196"  fill="#1A2610"/>
  <rect     x="68"  y="196" width="14" height="72" rx="2" fill="#1A2610"/>

  <polygon points="104,198  111,189  118,198" fill="#1A2610"/>
  <rect     x="104" y="198" width="14" height="70" rx="2" fill="#1A2610"/>

  <polygon points="140,196  147,187  154,196" fill="#1A2610"/>
  <rect     x="140" y="196" width="14" height="72" rx="2" fill="#1A2610"/>

  <polygon points="168,194  175.5,184  183,194" fill="#1A2610"/>
  <rect     x="168" y="194" width="15" height="74" rx="2" fill="#1A2610"/>

  <!-- Gate X-brace (drawn before gate posts) -->
  <line x1="183" y1="193" x2="217" y2="270" stroke="#182E10" stroke-width="6" stroke-linecap="round"/>
  <line x1="217" y1="193" x2="183" y2="270" stroke="#182E10" stroke-width="6" stroke-linecap="round"/>

  <!-- Gate posts (taller, slightly lighter colour) -->
  <polygon points="183,184  190.5,173  198,184" fill="#243A18"/>
  <rect     x="183" y="184" width="15" height="90" rx="2" fill="#243A18"/>

  <polygon points="202,184  209.5,173  217,184" fill="#243A18"/>
  <rect     x="202" y="184" width="15" height="90" rx="2" fill="#243A18"/>

  <!-- Gate horizontal beams -->
  <rect x="183" y="184" width="34" height="8"  rx="2" fill="#2B4820"/>
  <rect x="183" y="210" width="34" height="8"  rx="2" fill="#2B4820"/>
  <rect x="183" y="235" width="34" height="8"  rx="2" fill="#2B4820"/>

  <!-- Right section: rails -->
  <rect x="216" y="213" width="116" height="9" rx="2" fill="#121808"/>
  <rect x="216" y="237" width="116" height="9" rx="2" fill="#121808"/>

  <!-- Right section: posts -->
  <polygon points="217,194  224.5,184  232,194" fill="#1A2610"/>
  <rect     x="217" y="194" width="15" height="74" rx="2" fill="#1A2610"/>

  <polygon points="252,196  259,187  266,196" fill="#1A2610"/>
  <rect     x="252" y="196" width="14" height="72" rx="2" fill="#1A2610"/>

  <polygon points="288,198  295,189  302,198" fill="#1A2610"/>
  <rect     x="288" y="198" width="14" height="70" rx="2" fill="#1A2610"/>

  <polygon points="318,196  325,187  332,196" fill="#1A2610"/>
  <rect     x="318" y="196" width="14" height="72" rx="2" fill="#1A2610"/>

  <!-- Grass tufts -->
  <g fill="none" stroke="#1E3A12" stroke-linecap="round" stroke-width="1.5">
    <path d="M76 258 L80 247 L84 258"/>
    <path d="M91 259 L96 248 L101 259"/>
    <path d="M151 259 L156 248 L161 259"/>
    <path d="M242 259 L247 249 L252 259"/>
    <path d="M307 259 L312 248 L317 259"/>
    <path d="M323 259 L328 249 L333 259"/>
  </g>

  <!-- ── Text section ───────────────────────────────────────────── -->
  <line x1="44" y1="278" x2="356" y2="278" stroke="#FDB908" stroke-width="0.8" opacity="0.35"/>

  <!-- PADDUCK wordmark -->
  <text x="200" y="321"
        font-family="'Inter','Arial Black',Impact,system-ui,sans-serif"
        font-weight="900" font-size="65" text-anchor="middle" letter-spacing="-1">
    <tspan fill="white">PAD</tspan><tspan fill="#FDB908">DUCK</tspan>
  </text>

  <!-- IPAM -->
  <text x="200" y="341"
        font-family="'Inter','Helvetica Neue',Arial,system-ui,sans-serif"
        font-weight="600" font-size="17" text-anchor="middle"
        fill="white" letter-spacing="9">IPAM</text>

  <!-- Thin divider -->
  <line x1="44" y1="353" x2="356" y2="353" stroke="white" stroke-width="0.5" opacity="0.18"/>

  <!-- ── Bottom icons ────────────────────────────────────────────── -->
  <!-- DISCOVER: table grid icon -->
  <g fill="none" stroke="white" stroke-width="1.4">
    <rect x="40" y="359" width="20" height="13" rx="1.5"/>
    <line x1="40" y1="365" x2="60" y2="365"/>
    <line x1="50" y1="359" x2="50" y2="372"/>
  </g>
  <text x="50"  y="382" font-family="system-ui,sans-serif" font-size="7" fill="white" text-anchor="middle" letter-spacing="0.4">DISCOVER</text>

  <!-- MANAGE: location pin -->
  <path d="M150 358 A7 7 0 0 1 157 365 Q157 371 150 378 Q143 371 143 365 A7 7 0 0 1 150 358 Z"
        fill="none" stroke="white" stroke-width="1.4"/>
  <circle cx="150" cy="365" r="2.5" fill="white"/>
  <text x="150" y="382" font-family="system-ui,sans-serif" font-size="7" fill="white" text-anchor="middle" letter-spacing="0.4">MANAGE</text>

  <!-- AUTOMATE: gear -->
  <circle cx="250" cy="364" r="5.5" fill="none" stroke="white" stroke-width="1.4"/>
  <circle cx="250" cy="364" r="2"   fill="white"/>
  <g stroke="white" stroke-width="1.8" stroke-linecap="round">
    <line x1="250" y1="357"   x2="250" y2="355"/>
    <line x1="250" y1="371"   x2="250" y2="373"/>
    <line x1="243" y1="364"   x2="241" y2="364"/>
    <line x1="257" y1="364"   x2="259" y2="364"/>
    <line x1="245.1" y1="359.1" x2="243.7" y2="357.7"/>
    <line x1="254.9" y1="359.1" x2="256.3" y2="357.7"/>
    <line x1="245.1" y1="368.9" x2="243.7" y2="370.3"/>
    <line x1="254.9" y1="368.9" x2="256.3" y2="370.3"/>
  </g>
  <text x="250" y="382" font-family="system-ui,sans-serif" font-size="7" fill="white" text-anchor="middle" letter-spacing="0.4">AUTOMATE</text>

  <!-- TRUST: shield + checkmark -->
  <path d="M350 357 L359 361 L359 367 Q359 375 350 379 Q341 375 341 367 L341 361 Z"
        fill="none" stroke="white" stroke-width="1.4"/>
  <path d="M346 367 L349 372 L355 363"
        fill="none" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="350" y="382" font-family="system-ui,sans-serif" font-size="7" fill="white" text-anchor="middle" letter-spacing="0.4">TRUST</text>

  <!-- ── Tagline ─────────────────────────────────────────────────── -->
  <text x="200" y="395"
        font-family="system-ui,sans-serif"
        font-size="6.5" fill="white" text-anchor="middle"
        letter-spacing="2" opacity="0.45">NETWORK INTELLIGENCE. KEPT IN ORDER.</text>
</svg>
