<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" role="img" aria-label="Padduck IPAM">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="44%" r="44%">
      <stop offset="0%" stop-color="#0C2040"/>
      <stop offset="100%" stop-color="#020B1A"/>
    </radialGradient>
    <!-- Duck lit from upper-right (head/chest area) -->
    <radialGradient id="duckFill" cx="308" cy="155" r="205" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFE84A"/>
      <stop offset="32%"  stop-color="#FDBB10"/>
      <stop offset="100%" stop-color="#A86800"/>
    </radialGradient>
    <radialGradient id="tailFill" cx="50%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#FDBB10"/>
      <stop offset="100%" stop-color="#7A4800"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="#020B1A"/>
  <rect width="500" height="500" fill="url(#bgGlow)"/>

  <!-- ── Network topology dome ───────────────────────────────── -->
  <g stroke="#FDB908" stroke-width="1.3" fill="none" opacity="0.72" stroke-linecap="round">
    <!-- Top center to level 2 -->
    <line x1="250" y1="22"  x2="180" y2="56"/>
    <line x1="250" y1="22"  x2="320" y2="56"/>
    <!-- Level 2 cross-connect -->
    <line x1="180" y1="56"  x2="252" y2="84"/>
    <line x1="320" y1="56"  x2="252" y2="84"/>
    <!-- Level 2 outward -->
    <line x1="180" y1="56"  x2="118" y2="102"/>
    <line x1="320" y1="56"  x2="382" y2="102"/>
    <!-- Level 3 cross-connects -->
    <line x1="118" y1="102" x2="252" y2="84"/>
    <line x1="382" y1="102" x2="252" y2="84"/>
    <!-- Level 3 to leaf -->
    <line x1="118" y1="102" x2="82"  y2="147"/>
    <line x1="118" y1="102" x2="190" y2="138"/>
    <line x1="252" y1="84"  x2="190" y2="138"/>
    <line x1="252" y1="84"  x2="314" y2="138"/>
    <line x1="382" y1="102" x2="314" y2="138"/>
    <line x1="382" y1="102" x2="418" y2="147"/>
  </g>
  <g fill="#FDB908">
    <circle cx="250" cy="22"  r="7"/>
    <circle cx="180" cy="56"  r="5.5"/>
    <circle cx="320" cy="56"  r="5.5"/>
    <circle cx="118" cy="102" r="5"/>
    <circle cx="252" cy="84"  r="6.5"/>
    <circle cx="382" cy="102" r="5"/>
    <circle cx="82"  cy="147" r="4.5"/>
    <circle cx="190" cy="138" r="4.5"/>
    <circle cx="314" cy="138" r="4.5"/>
    <circle cx="418" cy="147" r="4.5"/>
  </g>
  <!-- Hub inner ring -->
  <circle cx="252" cy="84" r="2.5" fill="#020B1A"/>

  <!-- ── Duck (drawn BEFORE fence so fence overlaps lower body) ── -->

  <!-- Tail — small upturned bump on upper-left of body -->
  <ellipse cx="148" cy="217" rx="24" ry="15" fill="url(#tailFill)" transform="rotate(-22 148 217)"/>
  <ellipse cx="148" cy="217" rx="17" ry="10" fill="url(#duckFill)" transform="rotate(-22 148 217)"/>

  <!-- Body — large, round -->
  <ellipse cx="252" cy="252" rx="114" ry="100" fill="url(#duckFill)"/>
  <!-- Chest highlight -->
  <ellipse cx="232" cy="240" rx="62" ry="50" fill="#FFEA60" opacity="0.14"/>

  <!-- Head — sits upper-right, overlapping body for natural neck -->
  <circle cx="310" cy="166" r="56" fill="url(#duckFill)"/>
  <!-- Head highlight -->
  <ellipse cx="292" cy="150" rx="28" ry="22" fill="#FFEA60" opacity="0.18"/>

  <!-- Beak — teardrop pointing right -->
  <path d="M362 160 Q386 169 362 178 Z" fill="#CC6600"/>

  <!-- Eye -->
  <circle cx="336" cy="154" r="8"   fill="#020B1A"/>
  <circle cx="333" cy="151" r="2.7" fill="white" opacity="0.9"/>

  <!-- Wing arc -->
  <path d="M185 252 Q252 230 322 252" fill="none" stroke="#9A6A00" stroke-width="3" stroke-linecap="round"/>

  <!-- ── Fence (drawn OVER duck) ─────────────────────────────── -->
  <!-- Ground strip -->
  <rect x="60" y="305" width="380" height="18" rx="3" fill="#0B1707"/>

  <!-- ─ Left section rails ─ -->
  <rect x="68" y="234" width="140" height="11" rx="2" fill="#0D1807"/>
  <rect x="68" y="263" width="140" height="11" rx="2" fill="#0D1807"/>

  <!-- Left posts (3 regular posts; polygon cap + shaft) -->
  <polygon points="66,211  76,198  86,211"  fill="#162010"/>
  <rect     x="66"  y="211" width="20" height="112" rx="2" fill="#162010"/>

  <polygon points="112,212 122,199 132,212" fill="#162010"/>
  <rect     x="112" y="212" width="20" height="111" rx="2" fill="#162010"/>

  <polygon points="158,211 168,198 178,211" fill="#162010"/>
  <rect     x="158" y="211" width="20" height="112" rx="2" fill="#162010"/>

  <!-- Gate left post (taller, slightly lighter) -->
  <polygon points="193,199 204,184 215,199" fill="#213018"/>
  <rect     x="193" y="199" width="22" height="124" rx="2" fill="#213018"/>

  <!-- Gate X-brace -->
  <line x1="215" y1="199" x2="302" y2="305" stroke="#162810" stroke-width="8" stroke-linecap="round"/>
  <line x1="302" y1="199" x2="215" y2="305" stroke="#162810" stroke-width="8" stroke-linecap="round"/>

  <!-- Gate right post -->
  <polygon points="280,199 291,184 302,199" fill="#213018"/>
  <rect     x="280" y="199" width="22" height="124" rx="2" fill="#213018"/>

  <!-- Gate horizontal beams (3 rails across gate) -->
  <rect x="193" y="197" width="109" height="11" rx="2" fill="#294020"/>
  <rect x="193" y="232" width="109" height="11" rx="2" fill="#294020"/>
  <rect x="193" y="263" width="109" height="11" rx="2" fill="#294020"/>

  <!-- ─ Right section rails ─ -->
  <rect x="292" y="234" width="140" height="11" rx="2" fill="#0D1807"/>
  <rect x="292" y="263" width="140" height="11" rx="2" fill="#0D1807"/>

  <!-- Right posts -->
  <polygon points="307,212 317,199 327,212" fill="#162010"/>
  <rect     x="307" y="212" width="20" height="111" rx="2" fill="#162010"/>

  <polygon points="352,211 362,198 372,211" fill="#162010"/>
  <rect     x="352" y="211" width="20" height="112" rx="2" fill="#162010"/>

  <polygon points="396,212 406,199 416,212" fill="#162010"/>
  <rect     x="396" y="212" width="20" height="111" rx="2" fill="#162010"/>

  <!-- Grass tufts -->
  <g fill="none" stroke="#1A3810" stroke-linecap="round" stroke-width="2">
    <path d="M76  305 L82  291 L88  305"/>
    <path d="M104 306 L110 292 L116 306"/>
    <path d="M168 305 L174 292 L180 305"/>
    <path d="M322 305 L328 292 L334 305"/>
    <path d="M370 305 L376 292 L382 305"/>
    <path d="M408 305 L414 292 L420 305"/>
  </g>

  <!-- ── Text section ──────────────────────────────────────────── -->
  <line x1="42" y1="330" x2="458" y2="330" stroke="#FDB908" stroke-width="0.8" opacity="0.35"/>

  <!-- PADDUCK wordmark -->
  <text x="250" y="388"
        font-family="'Inter','Arial Black',Impact,system-ui,sans-serif"
        font-weight="900" font-size="80" text-anchor="middle" letter-spacing="-2">
    <tspan fill="white">PAD</tspan><tspan fill="#FDB908">DUCK</tspan>
  </text>

  <!-- IPAM -->
  <text x="250" y="412"
        font-family="'Inter','Helvetica Neue',Arial,system-ui,sans-serif"
        font-weight="600" font-size="21" text-anchor="middle"
        fill="white" letter-spacing="12">IPAM</text>

  <line x1="42" y1="428" x2="458" y2="428" stroke="white" stroke-width="0.5" opacity="0.18"/>

  <!-- ── Bottom icons ───────────────────────────────────────────── -->
  <!-- DISCOVER: table grid -->
  <g fill="none" stroke="white" stroke-width="1.5">
    <rect x="38" y="436" width="26" height="17" rx="1.5"/>
    <line x1="38" y1="445" x2="64" y2="445"/>
    <line x1="51" y1="436" x2="51" y2="453"/>
  </g>
  <text x="51"  y="465" font-family="system-ui,sans-serif" font-size="8" fill="white" text-anchor="middle" letter-spacing="0.4">DISCOVER</text>

  <!-- MANAGE: location pin -->
  <path d="M172 434 A9 9 0 0 1 181 443 Q181 452 172 460 Q163 452 163 443 A9 9 0 0 1 172 434 Z"
        fill="none" stroke="white" stroke-width="1.5"/>
  <circle cx="172" cy="443" r="3" fill="white"/>
  <text x="172" y="465" font-family="system-ui,sans-serif" font-size="8" fill="white" text-anchor="middle" letter-spacing="0.4">MANAGE</text>

  <!-- AUTOMATE: gear -->
  <circle cx="315" cy="443" r="7" fill="none" stroke="white" stroke-width="1.5"/>
  <circle cx="315" cy="443" r="2.5" fill="white"/>
  <g stroke="white" stroke-width="2" stroke-linecap="round">
    <line x1="315" y1="434" x2="315" y2="432"/>
    <line x1="315" y1="452" x2="315" y2="454"/>
    <line x1="306" y1="443" x2="304" y2="443"/>
    <line x1="324" y1="443" x2="326" y2="443"/>
    <line x1="309" y1="437" x2="307.5" y2="435.5"/>
    <line x1="321" y1="437" x2="322.5" y2="435.5"/>
    <line x1="309" y1="449" x2="307.5" y2="450.5"/>
    <line x1="321" y1="449" x2="322.5" y2="450.5"/>
  </g>
  <text x="315" y="465" font-family="system-ui,sans-serif" font-size="8" fill="white" text-anchor="middle" letter-spacing="0.4">AUTOMATE</text>

  <!-- TRUST: shield + checkmark -->
  <path d="M437 433 L449 438 L449 447 Q449 458 437 464 Q425 458 425 447 L425 438 Z"
        fill="none" stroke="white" stroke-width="1.5"/>
  <path d="M432 448 L436 454 L443 442"
        fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="437" y="465" font-family="system-ui,sans-serif" font-size="8" fill="white" text-anchor="middle" letter-spacing="0.4">TRUST</text>

  <!-- ── Tagline ────────────────────────────────────────────────── -->
  <text x="250" y="485"
        font-family="system-ui,sans-serif"
        font-size="7.5" fill="white" text-anchor="middle"
        letter-spacing="2" opacity="0.45">NETWORK INTELLIGENCE. KEPT IN ORDER.</text>
</svg>
