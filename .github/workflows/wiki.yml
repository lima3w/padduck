name: Sync Wiki

on:
  push:
    branches:
      - main
    paths:
      - '.github/wiki/**'
  workflow_dispatch:

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Push wiki pages
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git config --global init.defaultBranch master

          WIKI_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git"

          # Clone the wiki repo — fail clearly if it hasn't been initialized yet
          if ! git clone "$WIKI_URL" wiki-repo; then
            echo ""
            echo "ERROR: The wiki repository does not exist yet."
            echo "Please visit https://github.com/${{ github.repository }}/wiki"
            echo "and create the first page to initialize it, then re-run this workflow."
            exit 1
          fi

          # Sync pages
          cp .github/wiki/*.md wiki-repo/
          cd wiki-repo

          # Detect the default branch (master on fresh wikis, main on older ones)
          DEFAULT_BRANCH=$(git symbolic-ref --short HEAD)

          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to push"
          else
            git commit -m "Sync wiki from main repo"
            git push origin HEAD:"$DEFAULT_BRANCH"
          fi
