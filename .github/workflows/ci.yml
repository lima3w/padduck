name: CI Test Suite

on:
  push:
    branches-ignore:
      - main
    paths-ignore:
      - '.github/wiki/**'
      - '**.md'
  pull_request:
    paths-ignore:
      - '.github/wiki/**'
      - '**.md'
  workflow_dispatch:

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache: false

      - name: Show Go version
        run: |
          which go
          go version

      - name: Cache Go analysis tools
        id: cache-go-tools
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: go1.26.3-tools-staticcheck-v0.7.0-gosec-v2.26.1-govulncheck-v1.3.0

      - name: Install Go analysis tools
        if: steps.cache-go-tools.outputs.cache-hit != 'true'
        run: make go-analysis-tools

      - name: Check migrations
        run: |
          bad_up=$(grep -rL '^\-\- +migrate Up' backend/migrations/*.up.sql 2>/dev/null)
          bad_down=$(grep -rL '^\-\- +migrate Down' backend/migrations/*.down.sql 2>/dev/null)
          if [ -n "$bad_up" ] || [ -n "$bad_down" ]; then
            echo "ERROR: missing sql-migrate annotation in:"
            echo "$bad_up $bad_down" | tr ' ' '\n' | grep -v '^$'
            exit 1
          fi

      - name: Vet backend
        working-directory: ./backend
        run: go vet -mod=vendor ./...

      - name: Staticcheck Go modules
        run: make staticcheck

      - name: Gosec Go modules
        run: make gosec

      - name: Govulncheck Go modules
        run: make govulncheck

      - name: Test backend
        working-directory: ./backend
        run: go test -mod=vendor -race -count=1 ./...

      - name: Build agent
        working-directory: ./agent
        run: go build ./...

      - name: Test agent
        working-directory: ./agent
        run: go test -race -count=1 ./...

  frontend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint

      - name: Test frontend
        working-directory: ./frontend
        run: npm test

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build --silent

      - name: Generate dependency SBOM
        run: make sbom

      - name: Publish dependency SBOM
        run: |
          test -s sbom/dependency-sbom.cdx.json
          mkdir -p ci-artifacts
          cp sbom/dependency-sbom.cdx.json ci-artifacts/dependency-sbom.cdx.json
          sha256sum ci-artifacts/dependency-sbom.cdx.json
