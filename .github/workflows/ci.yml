name: CI Test Suite

on:
  push:
    branches-ignore:
      - main
    paths-ignore:
      - '.github/wiki/**'
      - '**.md'
  pull_request:
    paths-ignore:
      - '.github/wiki/**'
      - '**.md'
  workflow_dispatch:
  workflow_call:

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '1.26.4'
          cache: false

      - name: Show Go version
        run: |
          which go
          go version

      - name: Cache Go analysis tools
        id: cache-go-tools
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/go/bin
          key: go1.26.4-tools-staticcheck-v0.7.0-gosec-v2.26.1-govulncheck-v1.3.0

      - name: Install Go analysis tools
        if: steps.cache-go-tools.outputs.cache-hit != 'true'
        run: make go-analysis-tools

      - name: Check migrations
        run: |
          bad_up=$(grep -rL '^\-\- +migrate Up' backend/migrations/*.up.sql 2>/dev/null)
          bad_down=$(grep -rL '^\-\- +migrate Down' backend/migrations/*.down.sql 2>/dev/null)
          if [ -n "$bad_up" ] || [ -n "$bad_down" ]; then
            echo "ERROR: missing sql-migrate annotation in:"
            echo "$bad_up $bad_down" | tr ' ' '\n' | grep -v '^$'
            exit 1
          fi

      - name: Check OpenAPI spec sync
        run: make check-openapi-sync

      - name: Verify Go modules
        working-directory: ./backend
        run: go mod verify

      - name: Vet backend
        working-directory: ./backend
        run: go vet -mod=vendor ./...

      - name: Staticcheck Go modules
        run: make staticcheck

      - name: Gosec Go modules
        run: make gosec

      - name: Govulncheck Go modules
        run: make govulncheck

      - name: Test backend
        working-directory: ./backend
        env:
          TEST_DATABASE_URL: postgres://postgres:test@127.0.0.1:5432/postgres?sslmode=disable
        run: go test -mod=vendor -race -count=1 ./...

      - name: Build agent
        working-directory: ./agent
        run: go build ./...

      - name: Test agent
        working-directory: ./agent
        run: go test -race -count=1 ./...

  frontend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up npm
        run: |
          npm install -g npm@11.16.0
          npm --version

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: ./frontend
        run: npm audit --omit=dev --audit-level=high

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint

      - name: Test frontend
        working-directory: ./frontend
        run: npm run test:coverage

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build --silent

      - name: Generate dependency SBOM
        run: make sbom

      - name: Publish dependency SBOM
        run: |
          test -s sbom/dependency-sbom.cdx.json
          mkdir -p ci-artifacts
          cp sbom/dependency-sbom.cdx.json ci-artifacts/dependency-sbom.cdx.json
          sha256sum ci-artifacts/dependency-sbom.cdx.json

  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Build and boot the stack from the working tree
        run: |
          POSTGRES_PASSWORD=e2e-db-password ADMIN_PASSWORD=e2e-admin-password \
            docker compose -f docker-compose.yml -f docker-compose.e2e.yml -p padduck-e2e up -d --build --wait
          timeout 90 sh -c 'until curl -fsS http://127.0.0.1:3000/health >/dev/null 2>&1; do sleep 2; done'

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: ./frontend
        run: npx playwright install chromium --with-deps

      - name: Run Playwright suite
        working-directory: ./frontend
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
        run: npx playwright test

      - name: Upload traces and report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: playwright-artifacts
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

      - name: Tear down the stack
        if: always()
        run: |
          POSTGRES_PASSWORD=e2e-db-password \
            docker compose -f docker-compose.yml -f docker-compose.e2e.yml -p padduck-e2e down -v
