name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  OWNER: lima3w

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"
          NOTES=$(awk "/^## ${VERSION} /{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "No CHANGELOG entry found for ${VERSION}"
            NOTES="See CHANGELOG.md for details."
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/padduck-backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/padduck-frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          make_latest: true

  build-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build agent binaries
        run: |
          cd agent
          GOOS=linux   GOARCH=amd64 go build -o ../dist/padduck-agent-linux-amd64   .
          GOOS=linux   GOARCH=arm64 go build -o ../dist/padduck-agent-linux-arm64   .
          GOOS=darwin  GOARCH=amd64 go build -o ../dist/padduck-agent-darwin-amd64  .
          GOOS=darwin  GOARCH=arm64 go build -o ../dist/padduck-agent-darwin-arm64  .
          GOOS=windows GOARCH=amd64 go build -o ../dist/padduck-agent-windows-amd64.exe .

      - name: Upload agent binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/padduck-agent-linux-amd64
            dist/padduck-agent-linux-arm64
            dist/padduck-agent-darwin-amd64
            dist/padduck-agent-darwin-arm64
            dist/padduck-agent-windows-amd64.exe
