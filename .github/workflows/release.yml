name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths-ignore:
      - '.github/wiki/**'

env:
  REGISTRY: ghcr.io
  OWNER: lima3w

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release version
        id: version
        run: |
          set -euo pipefail

          version_from_changelog() {
            awk '/^## v[0-9]+\.[0-9]+\.[0-9]+$/{print $2; exit}' CHANGELOG.md
          }

          latest_semver_tag() {
            git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1
          }

          next_patch() {
            local tag="${1#v}"
            IFS=. read -r major minor patch <<< "${tag}"
            printf 'v%s.%s.%s\n' "${major}" "${minor}" "$((patch + 1))"
          }

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          else
            version="$(version_from_changelog)"
            latest="$(latest_semver_tag)"
            if [ -z "${version}" ]; then
              echo "ERROR: CHANGELOG.md must start with a vX.Y.Z section."
              exit 1
            fi
            if [ -z "${latest}" ]; then
              echo "ERROR: no existing semver tag found."
              exit 1
            fi

            if git rev-parse -q --verify "refs/tags/${version}" >/dev/null; then
              tagged_sha="$(git rev-list -n1 "${version}")"
              if [ "${tagged_sha}" != "${GITHUB_SHA}" ]; then
                expected="$(next_patch "${latest}")"
                echo "ERROR: CHANGELOG.md top version ${version} is already released (tagged at ${tagged_sha})."
                echo "Add a '## ${expected}' section to CHANGELOG.md and push a new commit."
                exit 1
              fi
            else
              expected="$(next_patch "${latest}")"
              if [ "${version}" != "${expected}" ]; then
                echo "ERROR: CHANGELOG.md top version must be ${expected}; found ${version}."
                echo "Latest release tag is ${latest}; patch version must increment on main pushes."
                exit 1
              fi

              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git tag -a "${version}" -m "${version}" "${GITHUB_SHA}"
              git push origin "refs/tags/${version}"
            fi
          fi

          version_no_v="${version#v}"
          major_minor="$(printf '%s\n' "${version_no_v}" | awk -F. '{print $1 "." $2}')"
          {
            echo "version=${version}"
            echo "version_no_v=${version_no_v}"
            echo "major_minor=${major_minor}"
          } >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## ${VERSION} /{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "No CHANGELOG entry found for ${VERSION}"
            NOTES="See CHANGELOG.md for details."
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/padduck-backend
          tags: |
            type=raw,value=${{ steps.version.outputs.version_no_v }}
            type=raw,value=${{ steps.version.outputs.major_minor }}
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/padduck-frontend
          tags: |
            type=raw,value=${{ steps.version.outputs.version_no_v }}
            type=raw,value=${{ steps.version.outputs.major_minor }}
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          make_latest: true

  build-agent:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build agent binaries
        run: |
          cd agent
          GOOS=linux   GOARCH=amd64 go build -o ../dist/padduck-agent-linux-amd64   .
          GOOS=linux   GOARCH=arm64 go build -o ../dist/padduck-agent-linux-arm64   .
          GOOS=darwin  GOARCH=amd64 go build -o ../dist/padduck-agent-darwin-amd64  .
          GOOS=darwin  GOARCH=arm64 go build -o ../dist/padduck-agent-darwin-arm64  .
          GOOS=windows GOARCH=amd64 go build -o ../dist/padduck-agent-windows-amd64.exe .

      - name: Upload agent binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.version }}
          files: |
            dist/padduck-agent-linux-amd64
            dist/padduck-agent-linux-arm64
            dist/padduck-agent-darwin-amd64
            dist/padduck-agent-darwin-arm64
            dist/padduck-agent-windows-amd64.exe
