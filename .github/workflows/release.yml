name: Release

# Releases are deliberate: push a vX.Y.Z tag to cut one. Merging to main no
# longer auto-tags — bump CHANGELOG.md in the PR, merge, then tag the commit.
on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  OWNER: lima3w

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Determine release version
        id: version
        run: |
          set -euo pipefail

          # The workflow only triggers on tag pushes, so the version is the tag.
          version="${GITHUB_REF_NAME}"
          if ! printf '%s\n' "${version}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: ${version} is not a vX.Y.Z release tag."
            exit 1
          fi

          version_no_v="${version#v}"
          major_minor="$(printf '%s\n' "${version_no_v}" | awk -F. '{print $1 "." $2}')"
          {
            echo "version=${version}"
            echo "version_no_v=${version_no_v}"
            echo "major_minor=${major_minor}"
          } >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## ${VERSION} /{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "No CHANGELOG entry found for ${VERSION}"
            NOTES="See CHANGELOG.md for details."
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/padduck-backend
          tags: |
            type=raw,value=${{ steps.version.outputs.version_no_v }}
            type=raw,value=${{ steps.version.outputs.major_minor }}
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push backend
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/padduck-frontend
          tags: |
            type=raw,value=${{ steps.version.outputs.version_no_v }}
            type=raw,value=${{ steps.version.outputs.major_minor }}
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push frontend
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64
          provenance: mode=min
          sbom: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          make_latest: true

  build-agent:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: agent/go.mod

      - name: Build agent binaries
        run: |
          cd agent
          GOOS=linux   GOARCH=amd64 go build -o ../dist/padduck-agent-linux-amd64   .
          GOOS=linux   GOARCH=arm64 go build -o ../dist/padduck-agent-linux-arm64   .
          GOOS=darwin  GOARCH=amd64 go build -o ../dist/padduck-agent-darwin-amd64  .
          GOOS=darwin  GOARCH=arm64 go build -o ../dist/padduck-agent-darwin-arm64  .
          GOOS=windows GOARCH=amd64 go build -o ../dist/padduck-agent-windows-amd64.exe .

      - name: Upload agent binaries to GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ needs.release.outputs.version }}
          files: |
            dist/padduck-agent-linux-amd64
            dist/padduck-agent-linux-arm64
            dist/padduck-agent-darwin-amd64
            dist/padduck-agent-darwin-arm64
            dist/padduck-agent-windows-amd64.exe
