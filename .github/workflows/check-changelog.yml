name: Check Changelog

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      # Documentation and reference
      - 'docs/**'
      - 'wiki/**'
      - '**/*.md'
      - '.github/wiki/**'
      - 'backend/docs/**'
      # Repo and CI config
      - '.github/**'
      - '.gitignore'
      - '.env.example'
      - 'LICENSE'
      # Dev tooling and scripts
      - 'tools/**'
      - '.claude/**'
      # Test-only infrastructure
      - 'docker-compose.e2e.yml'

jobs:
  check-changelog:
    runs-on: ubuntu-latest
    # Dependabot PRs only bump pinned action SHAs and cannot edit the
    # changelog; their changes are recorded in the release notes instead.
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0

      - name: Verify CHANGELOG.md is bumped for merge
        run: |
          set -euo pipefail

          latest_semver_tag() {
            git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1
          }

          # Returns 0 (true) if $1 > $2 under semver ordering.
          semver_gt() {
            [ "$(printf '%s\n%s\n' "$1" "$2" | sort -V | tail -n1)" = "$1" ] && [ "$1" != "$2" ]
          }

          latest="$(latest_semver_tag)"
          if [ -z "${latest}" ]; then
            echo "No semver tags found — skipping changelog check."
            exit 0
          fi

          actual="$(awk '/^## v[0-9]+\.[0-9]+\.[0-9]+$/{print $2; exit}' CHANGELOG.md)"

          if [ -z "${actual}" ]; then
            echo "ERROR: CHANGELOG.md has no version section. Add a '## vX.Y.Z' section (greater than ${latest}) at the top."
            exit 1
          fi

          if ! semver_gt "${actual}" "${latest}"; then
            echo "ERROR: CHANGELOG.md top version is ${actual}, which is not greater than the latest release tag ${latest}."
            echo "Add a new '## vX.Y.Z' section at the top of CHANGELOG.md with a version higher than ${latest}."
            exit 1
          fi

          echo "CHANGELOG.md top version is ${actual} (latest tag: ${latest}) — OK."
