services:
  db:
    image: postgres:18
    restart: unless-stopped
    volumes:
      - ./data/db:/var/lib/postgresql
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-padduck}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env — see .env.example}"
      POSTGRES_DB: "${POSTGRES_DB:-padduck}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-padduck} -d ${POSTGRES_DB:-padduck}"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s
    # Security hardening: prevent privilege escalation and drop all capabilities
    # except the two that the official Postgres init script needs (it starts as
    # root, chowns the data directory, then drops to the postgres user).
    # CHOWN and FOWNER are re-added so it can change ownership of ./data/db on
    # first boot. read_only is not applied because Postgres writes extensively
    # to its data volume and internal paths (/tmp, /var/run/postgresql) — fully
    # mapping those with tmpfs is brittle across minor Postgres upgrades.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
      - DAC_OVERRIDE

  backend:
    image: ghcr.io/lima3w/padduck-backend:${IMAGE_TAG:-1.34.10}
    restart: unless-stopped
    volumes:
      - ./data/backend:/app/data
    environment:
      DATABASE_URL: "${DATABASE_URL:-}"
      POSTGRES_USER: "${POSTGRES_USER:-padduck}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env — see .env.example}"
      POSTGRES_DB: "${POSTGRES_DB:-padduck}"
      POSTGRES_HOST: "db"
      SERVER_PORT: "${SERVER_PORT:-8080}"
      ENVIRONMENT: "production"
      MFA_ENCRYPTION_KEY: "${MFA_ENCRYPTION_KEY:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      RESET_ADMIN_PASSWORD: "${RESET_ADMIN_PASSWORD:-false}"
      LOG_LEVEL: "${LOG_LEVEL:-warn}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- \"http://127.0.0.1:${SERVER_PORT:-8080}/health\" | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    # Security hardening: read-only root filesystem with tmpfs for writable
    # runtime paths. The backend entrypoint runs as root, chowns /app/data,
    # then drops to the unprivileged app user via su-exec, so CHOWN, SETUID,
    # and SETGID must be retained. The backend writes the generated admin
    # password to /run/ipam/ and may use /tmp for scratch space — covered by
    # tmpfs mounts.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    read_only: true
    tmpfs:
      - /tmp
      - /run

  frontend:
    image: ghcr.io/lima3w/padduck-frontend:${IMAGE_TAG:-1.34.10}
    restart: unless-stopped
    ports:
      # Bind to loopback only so the UI is not exposed on all interfaces
      # without TLS. Access via http://localhost:3000 for local use.
      # For production, place a TLS-terminating reverse proxy (nginx, Caddy,
      # Traefik) in front and point it at 127.0.0.1:${FRONTEND_PORT:-3000}.
      # To bind on all interfaces (not recommended), override FRONTEND_BIND:
      #   FRONTEND_BIND=0.0.0.0
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_PORT:-3000}:${FRONTEND_INTERNAL_PORT:-3000}"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:${FRONTEND_INTERNAL_PORT:-3000}/health | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    # Security hardening: read-only root filesystem with tmpfs for the paths
    # nginx needs to write at runtime (pid file, temp/cache/log directories).
    # nginx serves on port 3000 (>1024) so NET_BIND_SERVICE is not needed.
    # The nginx master process starts as root, chowns the cache subdirectories
    # in /var/cache/nginx (tmpfs), then drops to the nginx worker user, so
    # CHOWN, SETUID, and SETGID must be retained. The IPv6 init script handles
    # a read-only /etc/nginx/conf.d gracefully (it exits without error).
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    read_only: true
    tmpfs:
      - /tmp
      - /var/run
      - /var/cache/nginx
      - /var/log/nginx
