services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-padduck}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-padduck}"
      POSTGRES_DB: "${POSTGRES_DB:-padduck}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-padduck} -d ${POSTGRES_DB:-padduck}"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    image: ghcr.io/lima3w/padduck-backend:${IMAGE_TAG:-latest}
    volumes:
      - ./data/backend:/app/data
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgres://${POSTGRES_USER:-padduck}:${POSTGRES_PASSWORD:-padduck}@db:5432/${POSTGRES_DB:-padduck}}"
      # Internal port the backend listens on. Must match the hardcoded value in
      # nginx.conf — do not change without also rebuilding the frontend image.
      SERVER_PORT: "8080"
      ENVIRONMENT: "production"
      MFA_ENCRYPTION_KEY: "${MFA_ENCRYPTION_KEY:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      RESET_ADMIN_PASSWORD: "${RESET_ADMIN_PASSWORD:-false}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- \"http://127.0.0.1:8080/health\" | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    image: ghcr.io/lima3w/padduck-frontend:${IMAGE_TAG:-latest}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
