services:
  db:
    image: postgres:18
    restart: unless-stopped
    volumes:
      - ./data/db:/var/lib/postgresql
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-padduck}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env — see .env.example}"
      POSTGRES_DB: "${POSTGRES_DB:-padduck}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-padduck} -d ${POSTGRES_DB:-padduck}"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    image: ghcr.io/lima3w/padduck-backend:${IMAGE_TAG:-v1.31.24}
    restart: unless-stopped
    volumes:
      - ./data/backend:/app/data
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgres://${POSTGRES_USER:-padduck}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-padduck}}"
      # Internal port the backend listens on. Must match the hardcoded value in
      # nginx.conf — do not change without also rebuilding the frontend image.
      SERVER_PORT: "8080"
      ENVIRONMENT: "production"
      MFA_ENCRYPTION_KEY: "${MFA_ENCRYPTION_KEY:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      RESET_ADMIN_PASSWORD: "${RESET_ADMIN_PASSWORD:-false}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- \"http://127.0.0.1:8080/health\" | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    image: ghcr.io/lima3w/padduck-frontend:${IMAGE_TAG:-v1.31.24}
    restart: unless-stopped
    ports:
      # Bind to loopback only so the UI is not exposed on all interfaces
      # without TLS. Access via http://localhost:3000 for local use.
      # For production, place a TLS-terminating reverse proxy (nginx, Caddy,
      # Traefik) in front and point it at 127.0.0.1:${FRONTEND_PORT:-3000}.
      # To bind on all interfaces (not recommended), override FRONTEND_BIND:
      #   FRONTEND_BIND=0.0.0.0
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:3000/health | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
