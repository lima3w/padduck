services:
  db:
    image: postgres:15.12
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-ipam}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-ipam}"
      POSTGRES_DB: "${POSTGRES_DB:-ipam}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ipam} -d ${POSTGRES_DB:-ipam}"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
      args:
        APP_VERSION: "${APP_VERSION:-dev}"
        GIT_COMMIT: "${GIT_COMMIT:-unknown}"
        BUILD_DATE: "${BUILD_DATE:-unknown}"
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgres://${POSTGRES_USER:-ipam}:${POSTGRES_PASSWORD:-ipam}@db:5432/${POSTGRES_DB:-ipam}}"
      SERVER_PORT: "${SERVER_PORT:-8080}"
      ENVIRONMENT: "${ENVIRONMENT:-production}"
      MFA_ENCRYPTION_KEY: "${MFA_ENCRYPTION_KEY:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      RESET_ADMIN_PASSWORD: "${RESET_ADMIN_PASSWORD:-false}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- \"http://127.0.0.1:${SERVER_PORT:-8080}/health\" | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
