name: CI Test Suite

on:
  push:
    branches-ignore:
      - 'main' # Already handled by deploy.yml
  pull_request:
  workflow_dispatch:

jobs:
  ci-test:
    runs-on: linux
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Run CI Local
        run: |
          cd frontend && npm install
          make ci-local
