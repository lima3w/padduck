name: CI Test Suite

on:
  push:
    branches-ignore:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  ci-test:
    runs-on: linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.2'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Check migrations
        run: |
          bad_up=$(grep -rL '^\-\- +migrate Up' backend/migrations/*.up.sql 2>/dev/null)
          bad_down=$(grep -rL '^\-\- +migrate Down' backend/migrations/*.down.sql 2>/dev/null)
          if [ -n "$bad_up" ] || [ -n "$bad_down" ]; then
            echo "ERROR: missing sql-migrate annotation in:"
            echo "$bad_up $bad_down" | tr ' ' '\n' | grep -v '^$'
            exit 1
          fi

      - name: Vet backend
        working-directory: ./backend
        run: go vet -mod=vendor ./...

      - name: Test backend
        working-directory: ./backend
        run: go test -mod=vendor -race -count=1 ./...

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint

      - name: Test frontend
        working-directory: ./frontend
        run: npm test

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build --silent

      - name: Build agent
        working-directory: ./agent
        run: go build ./...

      - name: Test agent
        working-directory: ./agent
        run: go test -race -count=1 ./...

      - name: Generate dependency SBOM
        run: make sbom

      - name: Publish dependency SBOM
        uses: actions/upload-artifact@v3
        with:
          name: dependency-sbom
          path: sbom/dependency-sbom.cdx.json
          if-no-files-found: error
