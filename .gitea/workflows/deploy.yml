name: Deploy to Runner

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: linux
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Run backend tests
        working-directory: ./backend
        run: |
          go mod download
          go mod tidy
          go test ./...

      - name: Run frontend tests
        working-directory: ./frontend
        run: |
          npm install
          npm test 2>/dev/null || echo "Frontend tests not configured, skipping"

      - name: Configure firewall
        run: |
          sudo firewall-cmd --permanent --add-port=8080/tcp || true
          sudo firewall-cmd --permanent --add-port=3000/tcp || true
          sudo firewall-cmd --reload || true

      - name: Stop existing containers
        run: docker compose down || true

      - name: Build and deploy services
        run: |
          docker compose build
          docker compose up -d

      - name: Verify health endpoint
        run: |
          for i in $(seq 1 12); do
            sleep 5
            if curl -sf http://localhost:8080/health; then
              echo "Backend healthy"
              exit 0
            fi
            echo "Attempt $i/12 failed, retrying..."
          done
          docker compose logs backend
          exit 1

      - name: Deployment summary
        run: |
          echo "✅ Deployment successful"
          docker compose ps
